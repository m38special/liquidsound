name: Deploy Preview

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches-ignore: [main]

jobs:
  deploy-preview:
    name: Deploy Vercel Preview
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(pnpm vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            2>&1 | tail -1)
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${{ github.event.workflow_run.head_branch }}`,
              state: 'open',
            });
            if (prs.length === 0) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prs[0].number,
              body: `### Vercel Preview Deployed\n\n**URL:** ${{ steps.deploy.outputs.url }}\n\n_Deployed from commit \`${{ github.event.workflow_run.head_sha }}\`_`,
            });
